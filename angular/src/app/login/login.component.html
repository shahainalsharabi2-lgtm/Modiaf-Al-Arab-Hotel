<div class="login-page" dir="rtl">
  <div class="login-background">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <div class="login-card">
    <div class="login-header">
      <div class="icon-box">
        <i class="fas fa-hotel" aria-hidden="true"></i>
      </div>
      <h2><ui-inline-text kind="screen" screen="settings" key="loginTitle" /></h2>
      <p><ui-inline-text kind="screen" screen="settings" key="loginPrompt" /></p>
    </div>

    <form class="login-form" (ngSubmit)="submit()">
      <div class="input-container">
        <i class="fas fa-user input-icon" aria-hidden="true"></i>
        <input
          type="text"
          [(ngModel)]="userName"
          name="userName"
          autocomplete="username"
          [placeholder]="ui.screenText('settings', 'userNamePh')"
          [disabled]="submitting" />
      </div>

      <div class="input-container input-container--password">
        <input
          [type]="showPassword ? 'text' : 'password'"
          [(ngModel)]="password"
          name="password"
          autocomplete="current-password"
          [placeholder]="ui.screenText('settings', 'passwordPh')"
          [disabled]="submitting" />
        <button
          type="button"
          class="password-toggle"
          (click)="togglePasswordVisibility()"
          [attr.aria-label]="
            showPassword
              ? ui.screenText('settings', 'toggleHidePassword')
              : ui.screenText('settings', 'toggleShowPassword')
          ">
          <i class="fas" [class.fa-eye]="!showPassword" [class.fa-eye-slash]="showPassword" aria-hidden="true"></i>
        </button>
      </div>

      <div class="error-message" *ngIf="errorMessage">
        <i class="fas fa-exclamation-triangle" aria-hidden="true"></i>
        {{ errorMessage }}
      </div>

      <button type="submit" class="login-btn" [disabled]="submitting">
        <i class="fas fa-sign-in-alt" aria-hidden="true"></i>
        <span><ui-inline-text kind="screen" screen="settings" key="loginBtn" /></span>
      </button>
    </form>

    <div class="login-footer">
      <p>© 2026 — <ui-inline-text kind="screen" screen="settings" key="loginFooter" /></p>
    </div>
  </div>
</div>
