<div class="hc-page" dir="rtl">
  <section class="hc-page__panel">
    <nav class="bc-tabs" role="tablist" [attr.aria-label]="ui.screenText('settings', 'bankCodingTabsAria')">
      <button type="button" role="tab" class="bc-tabs__btn bc-tabs__btn--active" aria-selected="true">
        <ui-inline-text kind="screen" screen="settings" key="bankCodingTabBanks" />
      </button>
    </nav>

    <div class="hc-page__toolbar">
      <div class="hc-page__filters">
        <div class="hc-page__search">
          <i class="fas fa-search" aria-hidden="true"></i>
          <input
            type="search"
            [(ngModel)]="searchQuery"
            [placeholder]="ui.screenText('settings', 'bankCodingSearchPh')" />
        </div>
        <label class="hc-page__select-wrap">
          <span class="sr-only"><ui-inline-text kind="screen" screen="settings" key="bankCodingFilterStatus" /></span>
          <select [(ngModel)]="statusFilter">
            <option value="all"><ui-inline-text kind="screen" screen="settings" key="bankCodingFilterAll" /></option>
            <option value="active"><ui-inline-text kind="screen" screen="settings" key="bankCodingFilterActive" /></option>
            <option value="inactive"><ui-inline-text kind="screen" screen="settings" key="bankCodingFilterInactive" /></option>
          </select>
        </label>
      </div>

      <div class="hc-page__toolbar-start">
        <button type="button" class="hc-page__add-btn" *ngIf="canEdit" (click)="openCreate()">
          <i class="fas fa-plus" aria-hidden="true"></i>
          <ui-inline-text kind="screen" screen="settings" key="bankCodingAdd" />
        </button>

        <div class="hc-page__view-toggle" role="group" [attr.aria-label]="ui.screenText('settings', 'bankCodingViewToggleAria')">
          <button
            type="button"
            class="hc-page__view-btn"
            [class.hc-page__view-btn--active]="viewMode === 'grid'"
            (click)="setViewMode('grid')"
            [title]="ui.screenText('settings', 'bankCodingViewGrid')">
            <i class="fas fa-th-large" aria-hidden="true"></i>
          </button>
          <button
            type="button"
            class="hc-page__view-btn"
            [class.hc-page__view-btn--active]="viewMode === 'list'"
            (click)="setViewMode('list')"
            [title]="ui.screenText('settings', 'bankCodingViewList')">
            <i class="fas fa-list" aria-hidden="true"></i>
          </button>
        </div>
      </div>
    </div>

    <div class="hc-page__empty" *ngIf="!filteredRows().length">
      <i class="fas fa-university" aria-hidden="true"></i>
      <p><ui-inline-text kind="screen" screen="settings" key="bankCodingEmpty" /></p>
    </div>

    <div class="hc-page__table-wrap" *ngIf="viewMode === 'list' && filteredRows().length">
      <table class="hc-page__table">
        <thead>
          <tr>
            <th class="hc-page__sortable" (click)="toggleSort('name')">
              <ui-inline-text kind="screen" screen="settings" key="bankCodingColName" />
              <i class="fas" [ngClass]="sortIcon('name')" aria-hidden="true"></i>
            </th>
            <th class="hc-page__sortable" dir="ltr" (click)="toggleSort('foreignName')">
              <ui-inline-text kind="screen" screen="settings" key="bankCodingColForeignName" />
              <i class="fas" [ngClass]="sortIcon('foreignName')" aria-hidden="true"></i>
            </th>
            <th class="hc-page__sortable bc-order" (click)="toggleSort('sortOrder')">
              <ui-inline-text kind="screen" screen="settings" key="bankCodingColOrder" />
              <i class="fas" [ngClass]="sortIcon('sortOrder')" aria-hidden="true"></i>
            </th>
            <th class="hc-page__sortable" (click)="toggleSort('account')">
              <ui-inline-text kind="screen" screen="settings" key="bankCodingColAccount" />
              <i class="fas" [ngClass]="sortIcon('account')" aria-hidden="true"></i>
            </th>
            <th class="hc-page__sortable" (click)="toggleSort('currencies')">
              <ui-inline-text kind="screen" screen="settings" key="bankCodingColCurrencies" />
              <i class="fas" [ngClass]="sortIcon('currencies')" aria-hidden="true"></i>
            </th>
            <th class="hc-page__col-actions" *ngIf="canEdit">
              <ui-inline-text kind="screen" screen="settings" key="bankCodingColActions" />
            </th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let row of filteredRows()">
            <td>{{ row.name }}</td>
            <td dir="ltr">{{ row.foreignName }}</td>
            <td class="bc-order">{{ row.sortOrder }}</td>
            <td>{{ row.account || '' }}</td>
            <td>{{ row.currencies || '' }}</td>
            <td class="hc-page__col-actions" *ngIf="canEdit">
              <div class="hc-page__actions">
                <button
                  type="button"
                  class="hc-page__actions-btn"
                  (click)="toggleActionsMenu(row.id, $event)"
                  [attr.aria-expanded]="openActionsId === row.id"
                  [attr.aria-label]="ui.screenText('settings', 'bankCodingColActions')">
                  <i class="fas fa-ellipsis-v" aria-hidden="true"></i>
                </button>
                <div class="hc-page__menu" *ngIf="openActionsId === row.id" (click)="$event.stopPropagation()">
                  <button type="button" (click)="openEdit(row)">
                    <i class="fas fa-pen" aria-hidden="true"></i>
                    <ui-inline-text kind="screen" screen="settings" key="bankCodingActionEdit" />
                  </button>
                  <button type="button" class="hc-page__menu-danger" (click)="deleteRow(row)">
                    <i class="fas fa-trash" aria-hidden="true"></i>
                    <ui-inline-text kind="screen" screen="settings" key="bankCodingActionDelete" />
                  </button>
                </div>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>
</div>
