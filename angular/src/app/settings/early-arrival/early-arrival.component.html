<div class="hc-page" dir="rtl">
  <section class="hc-page__panel">
    <div class="hc-page__toolbar">
      <div class="hc-page__filters">
        <div class="hc-page__search">
          <i class="fas fa-search" aria-hidden="true"></i>
          <input
            type="search"
            [(ngModel)]="searchQuery"
            [placeholder]="ui.screenText('settings', 'earlyArrivalSearchPh')" />
        </div>
        <label class="hc-page__select-wrap">
          <span class="sr-only"><ui-inline-text kind="screen" screen="settings" key="earlyArrivalFilterStatus" /></span>
          <select [(ngModel)]="statusFilter">
            <option value="all"><ui-inline-text kind="screen" screen="settings" key="earlyArrivalFilterAll" /></option>
            <option value="active"><ui-inline-text kind="screen" screen="settings" key="earlyArrivalFilterActive" /></option>
            <option value="inactive"><ui-inline-text kind="screen" screen="settings" key="earlyArrivalFilterInactive" /></option>
          </select>
        </label>
      </div>

      <div class="hc-page__toolbar-start">
        <button type="button" class="hc-page__add-btn" *ngIf="canEdit" (click)="openCreate()">
          <i class="fas fa-plus" aria-hidden="true"></i>
          <ui-inline-text kind="screen" screen="settings" key="earlyArrivalAdd" />
        </button>

        <div class="hc-page__view-toggle" role="group" [attr.aria-label]="ui.screenText('settings', 'earlyArrivalViewToggleAria')">
          <button
            type="button"
            class="hc-page__view-btn"
            [class.hc-page__view-btn--active]="viewMode === 'grid'"
            (click)="setViewMode('grid')"
            [title]="ui.screenText('settings', 'earlyArrivalViewGrid')">
            <i class="fas fa-th-large" aria-hidden="true"></i>
          </button>
          <button
            type="button"
            class="hc-page__view-btn"
            [class.hc-page__view-btn--active]="viewMode === 'list'"
            (click)="setViewMode('list')"
            [title]="ui.screenText('settings', 'earlyArrivalViewList')">
            <i class="fas fa-list" aria-hidden="true"></i>
          </button>
        </div>
      </div>
    </div>

    <div class="hc-page__empty" *ngIf="!filteredRows().length">
      <i class="fas fa-clock" aria-hidden="true"></i>
      <p><ui-inline-text kind="screen" screen="settings" key="earlyArrivalEmpty" /></p>
    </div>

    <div class="hc-page__table-wrap" *ngIf="viewMode === 'list' && filteredRows().length">
      <table class="hc-page__table">
        <thead>
          <tr>
            <th class="hc-page__sortable" (click)="toggleSort('policyType')">
              <ui-inline-text kind="screen" screen="settings" key="earlyArrivalColPolicyType" />
              <i class="fas" [ngClass]="sortIcon('policyType')" aria-hidden="true"></i>
            </th>
            <th class="hc-page__sortable" (click)="toggleSort('rentPercentage')">
              <ui-inline-text kind="screen" screen="settings" key="earlyArrivalColRentPercentage" />
              <i class="fas" [ngClass]="sortIcon('rentPercentage')" aria-hidden="true"></i>
            </th>
            <th class="hc-page__sortable" (click)="toggleSort('gracePeriodHours')">
              <ui-inline-text kind="screen" screen="settings" key="earlyArrivalColGracePeriod" />
              <i class="fas" [ngClass]="sortIcon('gracePeriodHours')" aria-hidden="true"></i>
            </th>
            <th class="hc-page__sortable" (click)="toggleSort('account')">
              <ui-inline-text kind="screen" screen="settings" key="earlyArrivalColAccount" />
              <i class="fas" [ngClass]="sortIcon('account')" aria-hidden="true"></i>
            </th>
            <th class="ea-check">
              <ui-inline-text kind="screen" screen="settings" key="earlyArrivalColActive" />
            </th>
            <th class="hc-page__col-actions" *ngIf="canEdit">
              <ui-inline-text kind="screen" screen="settings" key="earlyArrivalColActions" />
            </th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let row of filteredRows()">
            <td><span class="ea-badge">{{ row.policyType }}</span></td>
            <td>{{ row.rentPercentage }}%</td>
            <td>{{ row.gracePeriodHours }}h</td>
            <td class="ea-account">{{ accountLabel(row) }}</td>
            <td class="ea-check">
              <input type="checkbox" [checked]="row.isActive" disabled />
            </td>
            <td class="hc-page__col-actions" *ngIf="canEdit">
              <div class="hc-page__actions">
                <button
                  type="button"
                  class="hc-page__actions-btn"
                  (click)="toggleActionsMenu(row.id, $event)"
                  [attr.aria-expanded]="openActionsId === row.id"
                  [attr.aria-label]="ui.screenText('settings', 'earlyArrivalColActions')">
                  <i class="fas fa-ellipsis-v" aria-hidden="true"></i>
                </button>
                <div class="hc-page__menu" *ngIf="openActionsId === row.id" (click)="$event.stopPropagation()">
                  <button type="button" (click)="openEdit(row)">
                    <i class="fas fa-pen" aria-hidden="true"></i>
                    <ui-inline-text kind="screen" screen="settings" key="earlyArrivalActionEdit" />
                  </button>
                  <button type="button" class="hc-page__menu-danger" (click)="deleteRow(row)">
                    <i class="fas fa-trash" aria-hidden="true"></i>
                    <ui-inline-text kind="screen" screen="settings" key="earlyArrivalActionDelete" />
                  </button>
                </div>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>
</div>
