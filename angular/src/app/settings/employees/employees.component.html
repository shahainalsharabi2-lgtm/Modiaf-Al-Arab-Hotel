<div class="hc-page" dir="rtl">
  <section class="hc-page__panel">
    <div class="hc-page__toolbar">
      <div class="hc-page__filters">
        <div class="hc-page__search">
          <i class="fas fa-search" aria-hidden="true"></i>
          <input
            type="search"
            [(ngModel)]="searchQuery"
            [placeholder]="ui.screenText('settings', 'employeesSearchPh')" />
        </div>
        <label class="hc-page__select-wrap">
          <span class="sr-only"><ui-inline-text kind="screen" screen="settings" key="employeesFilterStatus" /></span>
          <select [(ngModel)]="statusFilter">
            <option value="all"><ui-inline-text kind="screen" screen="settings" key="employeesFilterAll" /></option>
            <option value="active"><ui-inline-text kind="screen" screen="settings" key="employeesFilterActive" /></option>
            <option value="inactive"><ui-inline-text kind="screen" screen="settings" key="employeesFilterInactive" /></option>
          </select>
        </label>
      </div>

      <div class="hc-page__toolbar-start">
        <button type="button" class="hc-page__add-btn" *ngIf="canEdit" (click)="openCreate()">
          <i class="fas fa-plus" aria-hidden="true"></i>
          <ui-inline-text kind="screen" screen="settings" key="employeesAdd" />
        </button>

        <div class="hc-page__view-toggle" role="group" [attr.aria-label]="ui.screenText('settings', 'employeesViewToggleAria')">
          <button
            type="button"
            class="hc-page__view-btn"
            [class.hc-page__view-btn--active]="viewMode === 'grid'"
            (click)="setViewMode('grid')"
            [title]="ui.screenText('settings', 'employeesViewGrid')">
            <i class="fas fa-th-large" aria-hidden="true"></i>
          </button>
          <button
            type="button"
            class="hc-page__view-btn"
            [class.hc-page__view-btn--active]="viewMode === 'list'"
            (click)="setViewMode('list')"
            [title]="ui.screenText('settings', 'employeesViewList')">
            <i class="fas fa-list" aria-hidden="true"></i>
          </button>
        </div>
      </div>
    </div>

    <div class="hc-page__empty" *ngIf="!filteredRows().length">
      <i class="fas fa-users" aria-hidden="true"></i>
      <p><ui-inline-text kind="screen" screen="settings" key="employeesEmpty" /></p>
    </div>

    <div class="hc-page__table-wrap" *ngIf="viewMode === 'list' && filteredRows().length">
      <table class="hc-page__table">
        <thead>
          <tr>
            <th class="hc-page__sortable" (click)="toggleSort('name')">
              <ui-inline-text kind="screen" screen="settings" key="employeesColName" />
              <i class="fas" [ngClass]="sortIcon('name')" aria-hidden="true"></i>
            </th>
            <th class="hc-page__sortable" (click)="toggleSort('mobile')">
              <ui-inline-text kind="screen" screen="settings" key="employeesColMobile" />
              <i class="fas" [ngClass]="sortIcon('mobile')" aria-hidden="true"></i>
            </th>
            <th class="hc-page__sortable hc-page__col-order" (click)="toggleSort('departmentId')">
              <ui-inline-text kind="screen" screen="settings" key="employeesColDepartment" />
              <i class="fas" [ngClass]="sortIcon('departmentId')" aria-hidden="true"></i>
            </th>
            <th class="emp-check hc-page__sortable" (click)="toggleSort('isActive')">
              <ui-inline-text kind="screen" screen="settings" key="employeesColActive" />
              <i class="fas" [ngClass]="sortIcon('isActive')" aria-hidden="true"></i>
            </th>
            <th class="emp-check hc-page__sortable" (click)="toggleSort('isAvailable')">
              <ui-inline-text kind="screen" screen="settings" key="employeesColAvailable" />
              <i class="fas" [ngClass]="sortIcon('isAvailable')" aria-hidden="true"></i>
            </th>
            <th class="hc-page__col-actions" *ngIf="canEdit">
              <ui-inline-text kind="screen" screen="settings" key="employeesColActions" />
            </th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let row of filteredRows()">
            <td>{{ row.name }}</td>
            <td class="emp-mobile">{{ row.mobile }}</td>
            <td class="emp-dept">{{ row.departmentId }}</td>
            <td class="emp-check">
              <input type="checkbox" [checked]="row.isActive" disabled />
            </td>
            <td class="emp-check">
              <input type="checkbox" [checked]="row.isAvailable" disabled />
            </td>
            <td class="hc-page__col-actions" *ngIf="canEdit">
              <div class="hc-page__actions">
                <button
                  type="button"
                  class="hc-page__actions-btn"
                  (click)="toggleActionsMenu(row.id, $event)"
                  [attr.aria-expanded]="openActionsId === row.id"
                  [attr.aria-label]="ui.screenText('settings', 'employeesColActions')">
                  <i class="fas fa-ellipsis-v" aria-hidden="true"></i>
                </button>
                <div class="hc-page__menu" *ngIf="openActionsId === row.id" (click)="$event.stopPropagation()">
                  <button type="button" (click)="openEdit(row)">
                    <i class="fas fa-pen" aria-hidden="true"></i>
                    <ui-inline-text kind="screen" screen="settings" key="employeesActionEdit" />
                  </button>
                  <button type="button" class="hc-page__menu-danger" (click)="deleteRow(row)">
                    <i class="fas fa-trash" aria-hidden="true"></i>
                    <ui-inline-text kind="screen" screen="settings" key="employeesActionDelete" />
                  </button>
                </div>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>
</div>
