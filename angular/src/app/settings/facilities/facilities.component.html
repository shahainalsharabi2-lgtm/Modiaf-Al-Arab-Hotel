<div class="hc-page" dir="rtl">
  <section class="hc-page__panel">
    <div class="hc-page__toolbar">
      <div class="hc-page__filters">
        <div class="hc-page__search">
          <i class="fas fa-search" aria-hidden="true"></i>
          <input
            type="search"
            [(ngModel)]="searchQuery"
            [placeholder]="ui.screenText('settings', 'facilitiesSearchPh')" />
        </div>
        <label class="hc-page__select-wrap">
          <span class="sr-only"><ui-inline-text kind="screen" screen="settings" key="facilitiesFilterStatus" /></span>
          <select [(ngModel)]="statusFilter">
            <option value="all"><ui-inline-text kind="screen" screen="settings" key="facilitiesFilterAll" /></option>
            <option value="active"><ui-inline-text kind="screen" screen="settings" key="facilitiesFilterActive" /></option>
            <option value="inactive"><ui-inline-text kind="screen" screen="settings" key="facilitiesFilterInactive" /></option>
          </select>
        </label>
      </div>

      <div class="hc-page__toolbar-start">
        <button type="button" class="hc-page__add-btn" *ngIf="canEdit" (click)="openCreate()">
          <i class="fas fa-plus" aria-hidden="true"></i>
          <ui-inline-text kind="screen" screen="settings" key="facilitiesAdd" />
        </button>

        <button type="button" class="hc-page__add-btn fac-import-btn" *ngIf="canEdit" (click)="importExport()">
          <i class="fas fa-file-import" aria-hidden="true"></i>
          <ui-inline-text kind="screen" screen="settings" key="facilitiesImportExport" />
        </button>

        <div class="hc-page__view-toggle" role="group" [attr.aria-label]="ui.screenText('settings', 'facilitiesViewToggleAria')">
          <button
            type="button"
            class="hc-page__view-btn"
            [class.hc-page__view-btn--active]="viewMode === 'grid'"
            (click)="setViewMode('grid')"
            [title]="ui.screenText('settings', 'facilitiesViewGrid')">
            <i class="fas fa-th-large" aria-hidden="true"></i>
          </button>
          <button
            type="button"
            class="hc-page__view-btn"
            [class.hc-page__view-btn--active]="viewMode === 'list'"
            (click)="setViewMode('list')"
            [title]="ui.screenText('settings', 'facilitiesViewList')">
            <i class="fas fa-list" aria-hidden="true"></i>
          </button>
        </div>
      </div>
    </div>

    <div class="hc-page__table-wrap" *ngIf="viewMode === 'list'">
      <table class="hc-page__table">
        <thead>
          <tr>
            <th class="hc-page__sortable" dir="ltr" (click)="toggleSort('code')">
              <ui-inline-text kind="screen" screen="settings" key="facilitiesColCode" />
              <i class="fas" [ngClass]="sortIcon('code')" aria-hidden="true"></i>
            </th>
            <th class="hc-page__sortable" (click)="toggleSort('name')">
              <ui-inline-text kind="screen" screen="settings" key="facilitiesColName" />
              <i class="fas" [ngClass]="sortIcon('name')" aria-hidden="true"></i>
            </th>
            <th class="hc-page__sortable" (click)="toggleSort('description')">
              <ui-inline-text kind="screen" screen="settings" key="facilitiesColDescription" />
              <i class="fas" [ngClass]="sortIcon('description')" aria-hidden="true"></i>
            </th>
            <th class="hc-page__sortable hc-page__col-order" (click)="toggleSort('displayOrder')">
              <ui-inline-text kind="screen" screen="settings" key="facilitiesColOrder" />
              <i class="fas" [ngClass]="sortIcon('displayOrder')" aria-hidden="true"></i>
            </th>
            <th class="hc-page__col-actions" *ngIf="canEdit">
              <ui-inline-text kind="screen" screen="settings" key="facilitiesColActions" />
            </th>
          </tr>
        </thead>
        <tbody>
          <tr *ngIf="!filteredRows().length">
            <td class="fac-empty" [attr.colspan]="canEdit ? 5 : 4">
              <i class="fas fa-inbox" aria-hidden="true"></i>
              <p><ui-inline-text kind="screen" screen="settings" key="facilitiesEmpty" /></p>
            </td>
          </tr>
          <tr *ngFor="let row of filteredRows()">
            <td class="hc-page__code" dir="ltr">{{ row.code }}</td>
            <td>{{ row.name }}</td>
            <td>{{ row.description || '' }}</td>
            <td class="hc-page__col-order">{{ row.displayOrder }}</td>
            <td class="hc-page__col-actions" *ngIf="canEdit">
              <div class="hc-page__actions">
                <button
                  type="button"
                  class="hc-page__actions-btn"
                  (click)="toggleActionsMenu(row.id, $event)"
                  [attr.aria-expanded]="openActionsId === row.id"
                  [attr.aria-label]="ui.screenText('settings', 'facilitiesColActions')">
                  <i class="fas fa-ellipsis-v" aria-hidden="true"></i>
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="fac-grid-empty" *ngIf="viewMode === 'grid' && !filteredRows().length">
      <i class="fas fa-inbox" aria-hidden="true"></i>
      <p><ui-inline-text kind="screen" screen="settings" key="facilitiesEmpty" /></p>
    </div>
  </section>
</div>
