<div class="hc-page" dir="rtl">
  <section class="hc-page__panel">
    <div class="hc-page__toolbar">
      <div class="hc-page__filters">
        <div class="hc-page__search">
          <i class="fas fa-search" aria-hidden="true"></i>
          <input
            type="search"
            [(ngModel)]="searchQuery"
            [placeholder]="ui.screenText('settings', 'marketCodesSearchPh')" />
        </div>
        <label class="hc-page__select-wrap">
          <span class="sr-only"><ui-inline-text kind="screen" screen="settings" key="marketCodesFilterStatus" /></span>
          <select [(ngModel)]="statusFilter">
            <option value="all"><ui-inline-text kind="screen" screen="settings" key="marketCodesFilterAll" /></option>
            <option value="active"><ui-inline-text kind="screen" screen="settings" key="marketCodesFilterActive" /></option>
            <option value="inactive"><ui-inline-text kind="screen" screen="settings" key="marketCodesFilterInactive" /></option>
          </select>
        </label>
      </div>

      <div class="hc-page__toolbar-start">
        <button type="button" class="hc-page__add-btn" *ngIf="canEdit" (click)="openCreate()">
          <i class="fas fa-plus" aria-hidden="true"></i>
          <ui-inline-text kind="screen" screen="settings" key="marketCodesAdd" />
        </button>

        <div class="hc-page__view-toggle" role="group" [attr.aria-label]="ui.screenText('settings', 'marketCodesViewToggleAria')">
          <button
            type="button"
            class="hc-page__view-btn"
            [class.hc-page__view-btn--active]="viewMode === 'grid'"
            (click)="setViewMode('grid')"
            [title]="ui.screenText('settings', 'marketCodesViewGrid')">
            <i class="fas fa-th-large" aria-hidden="true"></i>
          </button>
          <button
            type="button"
            class="hc-page__view-btn"
            [class.hc-page__view-btn--active]="viewMode === 'list'"
            (click)="setViewMode('list')"
            [title]="ui.screenText('settings', 'marketCodesViewList')">
            <i class="fas fa-list" aria-hidden="true"></i>
          </button>
        </div>
      </div>
    </div>

    <div class="hc-page__empty" *ngIf="!filteredRows().length">
      <i class="fas fa-store" aria-hidden="true"></i>
      <p><ui-inline-text kind="screen" screen="settings" key="marketCodesEmpty" /></p>
    </div>

    <div class="hc-page__table-wrap" *ngIf="viewMode === 'list' && filteredRows().length">
      <table class="hc-page__table">
        <thead>
          <tr>
            <th class="hc-page__sortable hc-page__col-order" (click)="toggleSort('code')">
              <ui-inline-text kind="screen" screen="settings" key="marketCodesColCode" />
              <i class="fas" [ngClass]="sortIcon('code')" aria-hidden="true"></i>
            </th>
            <th class="hc-page__sortable" (click)="toggleSort('name')">
              <ui-inline-text kind="screen" screen="settings" key="marketCodesColName" />
              <i class="fas" [ngClass]="sortIcon('name')" aria-hidden="true"></i>
            </th>
            <th class="hc-page__sortable" dir="ltr" (click)="toggleSort('foreignName')">
              <ui-inline-text kind="screen" screen="settings" key="marketCodesColForeignName" />
              <i class="fas" [ngClass]="sortIcon('foreignName')" aria-hidden="true"></i>
            </th>
            <th class="hc-page__sortable" (click)="toggleSort('description')">
              <ui-inline-text kind="screen" screen="settings" key="marketCodesColDescription" />
              <i class="fas" [ngClass]="sortIcon('description')" aria-hidden="true"></i>
            </th>
            <th class="hc-page__sortable mc-order" (click)="toggleSort('sortOrder')">
              <ui-inline-text kind="screen" screen="settings" key="marketCodesColOrder" />
              <i class="fas" [ngClass]="sortIcon('sortOrder')" aria-hidden="true"></i>
            </th>
            <th class="mc-check hc-page__sortable" (click)="toggleSort('isActive')">
              <ui-inline-text kind="screen" screen="settings" key="marketCodesColActive" />
              <i class="fas" [ngClass]="sortIcon('isActive')" aria-hidden="true"></i>
            </th>
            <th class="hc-page__col-actions" *ngIf="canEdit">
              <ui-inline-text kind="screen" screen="settings" key="marketCodesColActions" />
            </th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let row of filteredRows()">
            <td class="hc-page__col-order">{{ row.code }}</td>
            <td>{{ row.name }}</td>
            <td dir="ltr">{{ row.foreignName }}</td>
            <td>{{ row.description || '' }}</td>
            <td class="mc-order">{{ row.sortOrder }}</td>
            <td class="mc-check">
              <input type="checkbox" [checked]="row.isActive" disabled />
            </td>
            <td class="hc-page__col-actions" *ngIf="canEdit">
              <div class="hc-page__actions">
                <button
                  type="button"
                  class="hc-page__actions-btn"
                  (click)="toggleActionsMenu(row.id, $event)"
                  [attr.aria-expanded]="openActionsId === row.id"
                  [attr.aria-label]="ui.screenText('settings', 'marketCodesColActions')">
                  <i class="fas fa-ellipsis-v" aria-hidden="true"></i>
                </button>
                <div class="hc-page__menu" *ngIf="openActionsId === row.id" (click)="$event.stopPropagation()">
                  <button type="button" (click)="openEdit(row)">
                    <i class="fas fa-pen" aria-hidden="true"></i>
                    <ui-inline-text kind="screen" screen="settings" key="marketCodesActionEdit" />
                  </button>
                  <button type="button" class="hc-page__menu-danger" (click)="deleteRow(row)">
                    <i class="fas fa-trash" aria-hidden="true"></i>
                    <ui-inline-text kind="screen" screen="settings" key="marketCodesActionDelete" />
                  </button>
                </div>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>
</div>
