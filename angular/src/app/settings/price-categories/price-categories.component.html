<div class="hc-page" dir="rtl">
  <section class="hc-page__panel">
    <div class="hc-page__toolbar">
      <div class="hc-page__filters">
        <div class="hc-page__search">
          <i class="fas fa-search" aria-hidden="true"></i>
          <input
            type="search"
            [(ngModel)]="searchQuery"
            (ngModelChange)="onSearchChange()"
            [placeholder]="ui.screenText('settings', 'priceCategoriesSearchPh')" />
        </div>
        <label class="hc-page__select-wrap">
          <span class="sr-only"><ui-inline-text kind="screen" screen="settings" key="priceCategoriesFilterStatus" /></span>
          <select [(ngModel)]="statusFilter" (ngModelChange)="onSearchChange()">
            <option value="all"><ui-inline-text kind="screen" screen="settings" key="priceCategoriesFilterAll" /></option>
            <option value="active"><ui-inline-text kind="screen" screen="settings" key="priceCategoriesFilterActive" /></option>
            <option value="inactive"><ui-inline-text kind="screen" screen="settings" key="priceCategoriesFilterInactive" /></option>
          </select>
        </label>
      </div>

      <div class="hc-page__toolbar-start">
        <button type="button" class="hc-page__add-btn" *ngIf="canEdit" (click)="openCreate()">
          <i class="fas fa-plus" aria-hidden="true"></i>
          <ui-inline-text kind="screen" screen="settings" key="priceCategoriesNew" />
        </button>

        <div class="hc-page__view-toggle" role="group" [attr.aria-label]="ui.screenText('settings', 'priceCategoriesViewToggleAria')">
          <button
            type="button"
            class="hc-page__view-btn"
            [class.hc-page__view-btn--active]="viewMode === 'grid'"
            (click)="setViewMode('grid')"
            [title]="ui.screenText('settings', 'priceCategoriesViewGrid')">
            <i class="fas fa-th-large" aria-hidden="true"></i>
          </button>
          <button
            type="button"
            class="hc-page__view-btn"
            [class.hc-page__view-btn--active]="viewMode === 'list'"
            (click)="setViewMode('list')"
            [title]="ui.screenText('settings', 'priceCategoriesViewList')">
            <i class="fas fa-list" aria-hidden="true"></i>
          </button>
        </div>
      </div>
    </div>

    <div class="hc-page__empty" *ngIf="!filteredRows().length">
      <i class="fas fa-tags" aria-hidden="true"></i>
      <p><ui-inline-text kind="screen" screen="settings" key="priceCategoriesEmpty" /></p>
    </div>

    <div class="hc-page__table-wrap" *ngIf="viewMode === 'list' && filteredRows().length">
      <table class="hc-page__table pc-table">
        <thead>
          <tr>
            <th class="hc-page__sortable hc-page__col-order" (click)="toggleSort('code')">
              <ui-inline-text kind="screen" screen="settings" key="priceCategoriesColCode" />
              <i class="fas" [ngClass]="sortIcon('code')" aria-hidden="true"></i>
            </th>
            <th class="hc-page__sortable" (click)="toggleSort('name')">
              <ui-inline-text kind="screen" screen="settings" key="priceCategoriesColName" />
              <i class="fas" [ngClass]="sortIcon('name')" aria-hidden="true"></i>
            </th>
            <th class="hc-page__sortable" dir="ltr" (click)="toggleSort('foreignName')">
              <ui-inline-text kind="screen" screen="settings" key="priceCategoriesColForeignName" />
              <i class="fas" [ngClass]="sortIcon('foreignName')" aria-hidden="true"></i>
            </th>
            <th class="hc-page__sortable" (click)="toggleSort('description')">
              <ui-inline-text kind="screen" screen="settings" key="priceCategoriesColDescription" />
              <i class="fas" [ngClass]="sortIcon('description')" aria-hidden="true"></i>
            </th>
            <th class="hc-page__col-actions" *ngIf="canEdit">
              <ui-inline-text kind="screen" screen="settings" key="priceCategoriesColActions" />
            </th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let row of pagedRows()">
            <td class="hc-page__col-order">{{ row.code }}</td>
            <td>{{ row.name }}</td>
            <td dir="ltr">{{ row.foreignName }}</td>
            <td>{{ row.description || '' }}</td>
            <td class="hc-page__col-actions" *ngIf="canEdit">
              <div class="hc-page__actions">
                <button
                  type="button"
                  class="hc-page__actions-btn"
                  (click)="toggleActionsMenu(row.id, $event)"
                  [attr.aria-expanded]="openActionsId === row.id"
                  [attr.aria-label]="ui.screenText('settings', 'priceCategoriesColActions')">
                  <i class="fas fa-ellipsis-v" aria-hidden="true"></i>
                </button>
                <div class="hc-page__menu" *ngIf="openActionsId === row.id" (click)="$event.stopPropagation()">
                  <button type="button" (click)="openEdit(row)">
                    <i class="fas fa-pen" aria-hidden="true"></i>
                    <ui-inline-text kind="screen" screen="settings" key="priceCategoriesActionEdit" />
                  </button>
                  <button type="button" class="hc-page__menu-danger" (click)="deleteRow(row)">
                    <i class="fas fa-trash" aria-hidden="true"></i>
                    <ui-inline-text kind="screen" screen="settings" key="priceCategoriesActionDelete" />
                  </button>
                </div>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <footer class="rf-footer" *ngIf="viewMode === 'list' && totalRows()">
      <div class="rf-footer__range">
        <ui-inline-text kind="screen" screen="settings" key="roomFloorsShowing" />
        {{ rangeFrom() }}
        <ui-inline-text kind="screen" screen="settings" key="roomFloorsTo" />
        {{ rangeTo() }}
        <ui-inline-text kind="screen" screen="settings" key="roomFloorsOf" />
        {{ totalRows() }}
        <ui-inline-text kind="screen" screen="settings" key="roomFloorsRecords" />
      </div>

      <div class="rf-footer__pages">
        <button type="button" class="rf-page-btn" (click)="setPage(1)" [disabled]="pageIndex === 1">
          <i class="fas fa-angle-double-right" aria-hidden="true"></i>
        </button>
        <button type="button" class="rf-page-btn" (click)="setPage(pageIndex - 1)" [disabled]="pageIndex === 1">
          <i class="fas fa-angle-right" aria-hidden="true"></i>
        </button>
        <button
          type="button"
          class="rf-page-btn"
          *ngFor="let page of pageNumbers()"
          [class.rf-page-btn--active]="pageIndex === page"
          (click)="setPage(page)">
          {{ page }}
        </button>
        <button type="button" class="rf-page-btn" (click)="setPage(pageIndex + 1)" [disabled]="pageIndex === totalPages()">
          <i class="fas fa-angle-left" aria-hidden="true"></i>
        </button>
        <button type="button" class="rf-page-btn" (click)="setPage(totalPages())" [disabled]="pageIndex === totalPages()">
          <i class="fas fa-angle-double-left" aria-hidden="true"></i>
        </button>
      </div>

      <label class="rf-footer__size">
        <span><ui-inline-text kind="screen" screen="settings" key="roomFloorsPageSize" /></span>
        <select [(ngModel)]="pageSize" (ngModelChange)="onPageSizeChange()">
          <option [ngValue]="10">10</option>
          <option [ngValue]="25">25</option>
          <option [ngValue]="50">50</option>
        </select>
      </label>
    </footer>
  </section>
</div>

<div
  class="pc-modal"
  *ngIf="modalOpen"
  role="dialog"
  aria-modal="true"
  [attr.aria-label]="ui.screenText('settings', modalTitleKey())">
  <div class="pc-modal__backdrop" (click)="closeModal()"></div>
  <form class="pc-modal__card" (ngSubmit)="saveForm()">
    <header class="pc-modal__head">
      <h3><ui-inline-text kind="screen" screen="settings" [key]="modalTitleKey()" /></h3>
      <button type="button" class="pc-modal__close" (click)="closeModal()">
        <i class="fas fa-times" aria-hidden="true"></i>
      </button>
    </header>

    <div class="pc-modal__body">
      <label class="rt-field">
        <span class="rt-field__label"><ui-inline-text kind="screen" screen="settings" key="priceCategoriesColCode" /></span>
        <div class="rt-field__control">
          <input type="text" [(ngModel)]="form.code" name="code" [placeholder]="ui.screenText('settings', 'priceCategoriesColCode')" />
          <i class="fas fa-barcode rt-field__icon" aria-hidden="true"></i>
        </div>
      </label>
      <label class="rt-field">
        <span class="rt-field__label"><ui-inline-text kind="screen" screen="settings" key="priceCategoriesColName" /></span>
        <div class="rt-field__control">
          <input type="text" [(ngModel)]="form.name" name="name" [placeholder]="ui.screenText('settings', 'priceCategoriesColName')" />
          <i class="fas fa-user rt-field__icon" aria-hidden="true"></i>
        </div>
      </label>
      <label class="rt-field">
        <span class="rt-field__label"><ui-inline-text kind="screen" screen="settings" key="priceCategoriesColForeignName" /></span>
        <div class="rt-field__control">
          <input
            type="text"
            dir="ltr"
            [(ngModel)]="form.foreignName"
            name="foreignName"
            [placeholder]="ui.screenText('settings', 'priceCategoriesColForeignName')" />
          <i class="fas fa-id-card rt-field__icon" aria-hidden="true"></i>
        </div>
      </label>
      <label class="rt-field">
        <span class="rt-field__label"><ui-inline-text kind="screen" screen="settings" key="priceCategoriesColOrder" /></span>
        <div class="rt-field__control">
          <input type="text" dir="ltr" [(ngModel)]="form.displayOrder" name="displayOrder" [placeholder]="ui.screenText('settings', 'priceCategoriesColOrder')" />
          <i class="fas fa-sort rt-field__icon" aria-hidden="true"></i>
        </div>
      </label>
      <label class="rt-field rt-field--textarea">
        <span class="rt-field__label"><ui-inline-text kind="screen" screen="settings" key="priceCategoriesColDescription" /></span>
        <textarea rows="4" [(ngModel)]="form.description" name="description"></textarea>
      </label>
    </div>

    <footer class="pc-modal__foot">
      <button type="submit" class="pc-modal__save">
        <i class="fas fa-check" aria-hidden="true"></i>
        <ui-inline-text kind="screen" screen="settings" key="priceCategoriesFormSave" />
      </button>
      <button type="button" class="pc-modal__cancel" (click)="closeModal()">
        <i class="fas fa-times" aria-hidden="true"></i>
        <ui-inline-text kind="screen" screen="settings" key="cancelBtn" />
      </button>
    </footer>
  </form>
</div>
