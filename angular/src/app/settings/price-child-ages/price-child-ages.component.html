<div class="hc-page" dir="rtl">
  <section class="hc-page__panel">
    <div class="hc-page__toolbar">
      <div class="hc-page__filters">
        <div class="hc-page__search">
          <i class="fas fa-search" aria-hidden="true"></i>
          <input
            type="search"
            [(ngModel)]="searchQuery"
            [placeholder]="ui.screenText('settings', 'priceChildAgesSearchPh')" />
        </div>
        <label class="hc-page__select-wrap">
          <span class="sr-only"><ui-inline-text kind="screen" screen="settings" key="priceChildAgesFilterStatus" /></span>
          <select [(ngModel)]="statusFilter">
            <option value="all"><ui-inline-text kind="screen" screen="settings" key="priceChildAgesFilterAll" /></option>
            <option value="active"><ui-inline-text kind="screen" screen="settings" key="priceChildAgesFilterActive" /></option>
            <option value="inactive"><ui-inline-text kind="screen" screen="settings" key="priceChildAgesFilterInactive" /></option>
          </select>
        </label>
      </div>

      <div class="hc-page__toolbar-start">
        <button type="button" class="hc-page__add-btn" *ngIf="canEdit" (click)="openCreate()">
          <i class="fas fa-plus" aria-hidden="true"></i>
          <ui-inline-text kind="screen" screen="settings" key="priceChildAgesNew" />
        </button>

        <div class="hc-page__view-toggle" role="group" [attr.aria-label]="ui.screenText('settings', 'priceChildAgesViewToggleAria')">
          <button
            type="button"
            class="hc-page__view-btn"
            [class.hc-page__view-btn--active]="viewMode === 'grid'"
            (click)="setViewMode('grid')"
            [title]="ui.screenText('settings', 'priceChildAgesViewGrid')">
            <i class="fas fa-th-large" aria-hidden="true"></i>
          </button>
          <button
            type="button"
            class="hc-page__view-btn"
            [class.hc-page__view-btn--active]="viewMode === 'list'"
            (click)="setViewMode('list')"
            [title]="ui.screenText('settings', 'priceChildAgesViewList')">
            <i class="fas fa-list" aria-hidden="true"></i>
          </button>
        </div>
      </div>
    </div>

    <div class="hc-page__empty" *ngIf="!filteredRows().length">
      <i class="fas fa-child" aria-hidden="true"></i>
      <p><ui-inline-text kind="screen" screen="settings" key="priceChildAgesEmpty" /></p>
    </div>

    <div class="hc-page__table-wrap" *ngIf="viewMode === 'list' && filteredRows().length">
      <table class="hc-page__table pca-table">
        <thead>
          <tr>
            <th class="hc-page__sortable hc-page__col-order" (click)="toggleSort('ageFrom')">
              <ui-inline-text kind="screen" screen="settings" key="priceChildAgesColFrom" />
              <i class="fas" [ngClass]="sortIcon('ageFrom')" aria-hidden="true"></i>
            </th>
            <th class="hc-page__sortable hc-page__col-order" (click)="toggleSort('ageTo')">
              <ui-inline-text kind="screen" screen="settings" key="priceChildAgesColTo" />
              <i class="fas" [ngClass]="sortIcon('ageTo')" aria-hidden="true"></i>
            </th>
            <th class="hc-page__col-actions" *ngIf="canEdit">
              <ui-inline-text kind="screen" screen="settings" key="priceChildAgesColActions" />
            </th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let row of filteredRows()">
            <td class="hc-page__col-order">{{ row.ageFrom }}</td>
            <td class="hc-page__col-order">{{ row.ageTo }}</td>
            <td class="hc-page__col-actions" *ngIf="canEdit">
              <div class="hc-page__actions">
                <button
                  type="button"
                  class="hc-page__actions-btn"
                  (click)="toggleActionsMenu(row.id, $event)"
                  [attr.aria-expanded]="openActionsId === row.id"
                  [attr.aria-label]="ui.screenText('settings', 'priceChildAgesColActions')">
                  <i class="fas fa-ellipsis-v" aria-hidden="true"></i>
                </button>
                <div class="hc-page__menu" *ngIf="openActionsId === row.id" (click)="$event.stopPropagation()">
                  <button type="button" (click)="openEdit(row)">
                    <i class="fas fa-pen" aria-hidden="true"></i>
                    <ui-inline-text kind="screen" screen="settings" key="priceChildAgesActionEdit" />
                  </button>
                  <button type="button" class="hc-page__menu-danger" (click)="deleteRow(row)">
                    <i class="fas fa-trash" aria-hidden="true"></i>
                    <ui-inline-text kind="screen" screen="settings" key="priceChildAgesActionDelete" />
                  </button>
                </div>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>
</div>

<div
  class="pca-modal"
  *ngIf="modalOpen"
  role="dialog"
  aria-modal="true"
  [attr.aria-label]="ui.screenText('settings', modalTitleKey())">
  <div class="pca-modal__backdrop" (click)="closeModal()"></div>
  <form class="pca-modal__card" (ngSubmit)="saveForm()">
    <header class="pca-modal__head">
      <h3><ui-inline-text kind="screen" screen="settings" [key]="modalTitleKey()" /></h3>
      <button type="button" class="pca-modal__close" (click)="closeModal()">
        <i class="fas fa-times" aria-hidden="true"></i>
      </button>
    </header>

    <div class="pca-modal__body">
      <label class="rt-field">
        <span class="rt-field__label"><ui-inline-text kind="screen" screen="settings" key="priceChildAgesColFrom" /></span>
        <div class="rt-field__control">
          <input
            type="text"
            dir="ltr"
            [(ngModel)]="form.ageFrom"
            name="ageFrom"
            [placeholder]="ui.screenText('settings', 'priceChildAgesColFrom')" />
          <i class="fas fa-child rt-field__icon" aria-hidden="true"></i>
        </div>
      </label>
      <label class="rt-field">
        <span class="rt-field__label"><ui-inline-text kind="screen" screen="settings" key="priceChildAgesColTo" /></span>
        <div class="rt-field__control">
          <input
            type="text"
            dir="ltr"
            [(ngModel)]="form.ageTo"
            name="ageTo"
            [placeholder]="ui.screenText('settings', 'priceChildAgesColTo')" />
          <i class="fas fa-graduation-cap rt-field__icon" aria-hidden="true"></i>
        </div>
      </label>
    </div>

    <footer class="pca-modal__foot">
      <button type="submit" class="pca-modal__save">
        <i class="fas fa-check" aria-hidden="true"></i>
        <ui-inline-text kind="screen" screen="settings" key="priceChildAgesFormSave" />
      </button>
      <button type="button" class="pca-modal__cancel" (click)="closeModal()">
        <i class="fas fa-times" aria-hidden="true"></i>
        <ui-inline-text kind="screen" screen="settings" key="cancelBtn" />
      </button>
    </footer>
  </form>
</div>
