<div class="hc-page" dir="rtl">
  <section class="hc-page__panel">
    <div class="hc-page__toolbar">
      <div class="hc-page__filters">
        <div class="hc-page__search">
          <i class="fas fa-search" aria-hidden="true"></i>
          <input
            type="search"
            [(ngModel)]="searchQuery"
            [placeholder]="ui.screenText('settings', 'priceItemTypesSearchPh')" />
        </div>
        <label class="hc-page__select-wrap">
          <span class="sr-only"><ui-inline-text kind="screen" screen="settings" key="priceItemTypesFilterStatus" /></span>
          <select [(ngModel)]="statusFilter">
            <option value="all"><ui-inline-text kind="screen" screen="settings" key="priceItemTypesFilterAll" /></option>
            <option value="active"><ui-inline-text kind="screen" screen="settings" key="priceItemTypesFilterActive" /></option>
            <option value="inactive"><ui-inline-text kind="screen" screen="settings" key="priceItemTypesFilterInactive" /></option>
          </select>
        </label>
      </div>

      <div class="hc-page__toolbar-start">
        <button type="button" class="hc-page__add-btn" *ngIf="canEdit" (click)="openCreate()">
          <i class="fas fa-plus" aria-hidden="true"></i>
          <ui-inline-text kind="screen" screen="settings" key="priceItemTypesNew" />
        </button>

        <div class="hc-page__view-toggle" role="group" [attr.aria-label]="ui.screenText('settings', 'priceItemTypesViewToggleAria')">
          <button
            type="button"
            class="hc-page__view-btn"
            [class.hc-page__view-btn--active]="viewMode === 'grid'"
            (click)="setViewMode('grid')"
            [title]="ui.screenText('settings', 'priceItemTypesViewGrid')">
            <i class="fas fa-th-large" aria-hidden="true"></i>
          </button>
          <button
            type="button"
            class="hc-page__view-btn"
            [class.hc-page__view-btn--active]="viewMode === 'list'"
            (click)="setViewMode('list')"
            [title]="ui.screenText('settings', 'priceItemTypesViewList')">
            <i class="fas fa-list" aria-hidden="true"></i>
          </button>
        </div>
      </div>
    </div>

    <div class="hc-page__empty" *ngIf="!filteredRows().length">
      <i class="fas fa-box" aria-hidden="true"></i>
      <p><ui-inline-text kind="screen" screen="settings" key="priceItemTypesEmpty" /></p>
    </div>

    <div class="hc-page__table-wrap" *ngIf="viewMode === 'list' && filteredRows().length">
      <table class="hc-page__table pit-table">
        <thead>
          <tr>
            <th class="hc-page__sortable" (click)="toggleSort('name')">
              <ui-inline-text kind="screen" screen="settings" key="priceItemTypesColName" />
              <i class="fas" [ngClass]="sortIcon('name')" aria-hidden="true"></i>
            </th>
            <th class="hc-page__sortable" dir="ltr" (click)="toggleSort('foreignName')">
              <ui-inline-text kind="screen" screen="settings" key="priceItemTypesColForeignName" />
              <i class="fas" [ngClass]="sortIcon('foreignName')" aria-hidden="true"></i>
            </th>
            <th class="hc-page__sortable" (click)="toggleSort('revenueAccount')">
              <ui-inline-text kind="screen" screen="settings" key="priceItemTypesColRevenueAccount" />
              <i class="fas" [ngClass]="sortIcon('revenueAccount')" aria-hidden="true"></i>
            </th>
            <th class="hc-page__col-actions" *ngIf="canEdit">
              <ui-inline-text kind="screen" screen="settings" key="priceItemTypesColActions" />
            </th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let row of filteredRows()">
            <td>{{ row.name }}</td>
            <td dir="ltr">{{ row.foreignName || '' }}</td>
            <td>{{ row.revenueAccount }}</td>
            <td class="hc-page__col-actions" *ngIf="canEdit">
              <div class="hc-page__actions">
                <button
                  type="button"
                  class="hc-page__actions-btn"
                  (click)="toggleActionsMenu(row.id, $event)"
                  [attr.aria-expanded]="openActionsId === row.id"
                  [attr.aria-label]="ui.screenText('settings', 'priceItemTypesColActions')">
                  <i class="fas fa-ellipsis-v" aria-hidden="true"></i>
                </button>
                <div class="hc-page__menu" *ngIf="openActionsId === row.id" (click)="$event.stopPropagation()">
                  <button type="button" (click)="openEdit(row)">
                    <i class="fas fa-pen" aria-hidden="true"></i>
                    <ui-inline-text kind="screen" screen="settings" key="priceItemTypesActionEdit" />
                  </button>
                  <button type="button" class="hc-page__menu-danger" (click)="deleteRow(row)">
                    <i class="fas fa-trash" aria-hidden="true"></i>
                    <ui-inline-text kind="screen" screen="settings" key="priceItemTypesActionDelete" />
                  </button>
                </div>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>
</div>

<div
  class="pit-modal"
  *ngIf="modalOpen"
  role="dialog"
  aria-modal="true"
  [attr.aria-label]="ui.screenText('settings', modalTitleKey())">
  <div class="pit-modal__backdrop" (click)="closeModal()"></div>
  <form class="pit-modal__card" (ngSubmit)="saveForm()">
    <header class="pit-modal__head">
      <h3><ui-inline-text kind="screen" screen="settings" [key]="modalTitleKey()" /></h3>
      <button type="button" class="pit-modal__close" (click)="closeModal()">
        <i class="fas fa-times" aria-hidden="true"></i>
      </button>
    </header>

    <div class="pit-modal__body">
      <label class="rt-field">
        <span class="rt-field__label"><ui-inline-text kind="screen" screen="settings" key="priceItemTypesColName" /></span>
        <div class="rt-field__control">
          <input type="text" [(ngModel)]="form.name" name="name" [placeholder]="ui.screenText('settings', 'priceItemTypesColName')" />
          <i class="fas fa-user rt-field__icon" aria-hidden="true"></i>
        </div>
      </label>
      <label class="rt-field">
        <span class="rt-field__label"><ui-inline-text kind="screen" screen="settings" key="priceItemTypesColForeignName" /></span>
        <div class="rt-field__control">
          <input
            type="text"
            dir="ltr"
            [(ngModel)]="form.foreignName"
            name="foreignName"
            [placeholder]="ui.screenText('settings', 'priceItemTypesColForeignName')" />
          <i class="fas fa-id-card rt-field__icon" aria-hidden="true"></i>
        </div>
      </label>
      <label class="rt-field">
        <span class="rt-field__label"><ui-inline-text kind="screen" screen="settings" key="priceItemTypesFormRevenueType" /></span>
        <div class="rt-field__control rt-field__control--select">
          <select [(ngModel)]="form.revenueType" name="revenueType">
            <option value="restaurant"><ui-inline-text kind="screen" screen="settings" key="priceItemTypesOptRestaurant" /></option>
          </select>
          <i class="fas fa-list rt-field__icon" aria-hidden="true"></i>
        </div>
      </label>
      <label class="rt-field">
        <span class="rt-field__label"><ui-inline-text kind="screen" screen="settings" key="priceItemTypesFormAccount" /></span>
        <div class="rt-field__control rt-field__control--select">
          <select [(ngModel)]="form.account" name="account">
            <option value=""><ui-inline-text kind="screen" screen="settings" key="priceItemTypesFormAccountPlaceholder" /></option>
            <option value="3001">3001 - ايرادات كوفي شوب</option>
            <option value="3002">3002 - ايرادات كرسي مطعم</option>
            <option value="3006">3006 - إيراد مغسلة (غسيل وكوي الملابس)</option>
          </select>
          <i class="fas fa-credit-card rt-field__icon" aria-hidden="true"></i>
        </div>
      </label>
    </div>

    <footer class="pit-modal__foot">
      <button type="submit" class="pit-modal__save">
        <i class="fas fa-check" aria-hidden="true"></i>
        <ui-inline-text kind="screen" screen="settings" key="priceItemTypesFormSave" />
      </button>
      <button type="button" class="pit-modal__cancel" (click)="closeModal()">
        <i class="fas fa-times" aria-hidden="true"></i>
        <ui-inline-text kind="screen" screen="settings" key="cancelBtn" />
      </button>
    </footer>
  </form>
</div>
