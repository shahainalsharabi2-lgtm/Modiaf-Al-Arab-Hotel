<div class="tb-page" dir="rtl">
  <div class="tb-page__top">
    <button type="button" class="tb-new-card" *ngIf="canEdit" (click)="openCreate()">
      <span class="tb-new-card__label"><ui-inline-text kind="screen" screen="settings" key="taxBracketsNew" /></span>
      <span class="tb-new-card__btn" aria-hidden="true">
        <i class="fas fa-plus"></i>
      </span>
      <span class="tb-new-card__hint"><ui-inline-text kind="screen" screen="settings" key="taxBracketsNewItem" /></span>
    </button>
  </div>

  <section class="tb-page__panel">
    <header class="tb-section-head">
      <i class="fas fa-th" aria-hidden="true"></i>
      <h2><ui-inline-text kind="screen" screen="settings" key="stgTaxBrackets" /></h2>
    </header>

    <div class="tb-search">
      <input
        type="search"
        [(ngModel)]="searchQuery"
        [placeholder]="ui.screenText('settings', 'taxBracketsSearchPh')" />
      <i class="fas fa-search" aria-hidden="true"></i>
    </div>

    <div class="tb-table-wrap">
      <table class="hc-page__table tb-table">
        <thead>
          <tr>
            <th class="hc-page__sortable hc-page__col-order" (click)="toggleSort('id')">
              <ui-inline-text kind="screen" screen="settings" key="taxBracketsColSerial" />
              <i class="fas" [ngClass]="sortIcon('id')" aria-hidden="true"></i>
            </th>
            <th class="hc-page__sortable" (click)="toggleSort('name')">
              <ui-inline-text kind="screen" screen="settings" key="taxBracketsColName" />
              <i class="fas" [ngClass]="sortIcon('name')" aria-hidden="true"></i>
            </th>
            <th class="hc-page__sortable" dir="ltr" (click)="toggleSort('foreignName')">
              <ui-inline-text kind="screen" screen="settings" key="taxBracketsColForeignName" />
              <i class="fas" [ngClass]="sortIcon('foreignName')" aria-hidden="true"></i>
            </th>
            <th class="hc-page__sortable" (click)="toggleSort('percentage')">
              <ui-inline-text kind="screen" screen="settings" key="taxBracketsColPercentage" />
              <i class="fas" [ngClass]="sortIcon('percentage')" aria-hidden="true"></i>
            </th>
            <th class="hc-page__col-actions" *ngIf="canEdit">
              <ui-inline-text kind="screen" screen="settings" key="taxBracketsColActions" />
            </th>
          </tr>
        </thead>
        <tbody>
          <tr *ngIf="!filteredRows().length">
            <td class="tb-empty" [attr.colspan]="canEdit ? 5 : 4">
              <ui-inline-text kind="screen" screen="settings" key="taxBracketsEmpty" />
            </td>
          </tr>
          <tr *ngFor="let row of filteredRows()">
            <td class="hc-page__col-order">{{ row.id }}</td>
            <td>{{ row.name }}</td>
            <td dir="ltr">{{ row.foreignName }}</td>
            <td dir="ltr">{{ formatPercentage(row.percentage) }}</td>
            <td class="hc-page__col-actions" *ngIf="canEdit">
              <div class="hc-page__actions">
                <button
                  type="button"
                  class="hc-page__actions-btn"
                  (click)="toggleActionsMenu(row.id, $event)"
                  [attr.aria-expanded]="openActionsId === row.id"
                  [attr.aria-label]="ui.screenText('settings', 'taxBracketsColActions')">
                  <i class="fas fa-ellipsis-v" aria-hidden="true"></i>
                </button>
                <div class="hc-page__menu" *ngIf="openActionsId === row.id" (click)="$event.stopPropagation()">
                  <button type="button" (click)="openEdit(row)">
                    <i class="fas fa-pen" aria-hidden="true"></i>
                    <ui-inline-text kind="screen" screen="settings" key="taxBracketsActionEdit" />
                  </button>
                  <button type="button" class="hc-page__menu-danger" (click)="deleteRow(row)">
                    <i class="fas fa-trash" aria-hidden="true"></i>
                    <ui-inline-text kind="screen" screen="settings" key="taxBracketsActionDelete" />
                  </button>
                </div>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>
</div>
