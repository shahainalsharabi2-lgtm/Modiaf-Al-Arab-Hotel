# Render Blueprint — نشر API مجانًا (Docker + PostgreSQL من Neon)
# استخدم: Render Dashboard → New + → Blueprint → اختر المستودع
databases: []

services:
  - type: web
    name: hotel-api
    runtime: docker
    rootDir: aspnet-core
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: Database__Provider
        value: PostgreSql
      - key: ConnectionStrings__Default
        sync: false
      - key: App__SelfUrl
        value: https://hotel-api-fo0z.onrender.com
      - key: AuthServer__Authority
        value: https://hotel-api-fo0z.onrender.com
      - key: App__ClientUrl
        value: https://hotel-management.shahainalsharabi2.workers.dev
      - key: App__CorsOrigins
        value: https://hotel-management.shahainalsharabi2.workers.dev
      - key: App__RedirectAllowedUrls
        value: https://hotel-management.shahainalsharabi2.workers.dev
